version: '3.8'

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - logistica-net
    healthcheck:
      test: echo srvr | nc localhost 2181 | grep Mode
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_LOG4J_LOGGERS: "kafka.controller=INFO,kafka.producer.async.DefaultEventHandler=INFO,state.change.logger=INFO"
    networks:
      - logistica-net
    healthcheck:
      test: kafka-topics --bootstrap-server kafka:29092 --list
      interval: 15s
      timeout: 15s
      retries: 10
      start_period: 30s

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: logistica
      POSTGRES_PASSWORD: logistica123
      POSTGRES_DB: logistica_db
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backend/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - logistica-net
    healthcheck:
      test: pg_isready -U logistica -d logistica_db
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend-api
    command: node src/server.js
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      DATABASE_URL: postgres://logistica:logistica123@postgres:5432/logistica_db
      KAFKA_BROKER: kafka:29092
      NODE_ENV: production
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - logistica-net
    restart: on-failure

  backend-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend-worker
    command: node src/worker.js
    environment:
      DATABASE_URL: postgres://logistica:logistica123@postgres:5432/logistica_db
      KAFKA_BROKER: kafka:29092
      WEBSOCKET_PORT: 3002
      NODE_ENV: production
    ports:
      - "3002:3002"
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - logistica-net
    restart: on-failure

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    ports:
      - "3000:80"
    depends_on:
      - backend-api
      - backend-worker
    networks:
      - logistica-net

volumes:
  postgres-data:

networks:
  logistica-net:
    driver: bridge
